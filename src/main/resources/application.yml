
SMTP_USERNAME: kpwork7827@gmail.com
SMTP_PASSWORD:
server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: gradle-demo-email-service
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

app:
  mail:
    default-from: ${MAIL_FROM:${SMTP_USERNAME:}}